version: '3.8'

services:
  leantime-db:
    image: mysql:8.0
    container_name: leantime-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=leantime
      - MYSQL_DATABASE=leantime
      - MYSQL_USER=leantime
      - MYSQL_PASSWORD=leantime
    volumes:
      - leantime-db:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  leantime:
    image: leantime/leantime:latest
    container_name: leantime
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - LEAN_APP_URL=http://localhost:8080
      - LEAN_DB_HOST=leantime-db
      - LEAN_DB_USER=leantime
      - LEAN_DB_PASSWORD=leantime
      - LEAN_DB_DATABASE=leantime
      - LEAN_SESSION_PASSWORD=secretsessionkey
      - LEAN_SESSION_SALT=secretsalt
    volumes:
      - leantime-files:/var/www/html/public/userfiles
    depends_on:
      - leantime-db

volumes:
  leantime-db:
  leantime-files:
